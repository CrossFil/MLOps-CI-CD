apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlflow
spec:
  type: NodePort
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30005
  selector:
    app: mlflow
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.10.2
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install psycopg2-binary boto3 &&
              mlflow server \
              --host 0.0.0.0 \
              --port 5000 \
              --backend-store-uri postgresql://mlflowuser:mlflowpass@postgres:5432/mlflowdb \
              --default-artifact-root s3://mlflow/
          env:
            - name: AWS_ACCESS_KEY_ID
              value: "minioadmin"
            - name: AWS_SECRET_ACCESS_KEY
              value: "minioadmin"
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://minio.mlflow.svc.cluster.local:9000"
            - name: AWS_DEFAULT_REGION
              value: "eu-central-1"
            - name: MLFLOW_S3_IGNORE_TLS
              value: "true"
            - name: BOTO_PATH
              value: "/dev/null"
          ports:
            - containerPort: 5000
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.10.2
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --upgrade pip && 
              pip install psycopg2-binary boto3 && 
              mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://mlflowuser:mlflowpass@postgres:5432/mlflowdb --default-artifact-root s3://mlflow/ --artifacts-destination s3://mlflow/
              --host 0.0.0.0 \
              --port 5000 \
              --backend-store-uri postgresql://mlflowuser:mlflowpass@postgres:5432/mlflowdb \
              --artifacts-destination ./mlruns
          ports:
            - containerPort: 5000            - --port=5000
            - --backend-store-uri=postgresql://mlflowuser:mlflowpass@postgres:5432/mlflowdb
            - --artifacts-destination=./mlruns
          ports:
            - containerPort: 5000
