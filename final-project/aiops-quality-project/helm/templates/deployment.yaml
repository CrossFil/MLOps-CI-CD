apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-service
  labels:
    app: aiops-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: aiops-service
  template:
    metadata:
      labels:
        app: aiops-service
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      containers:
        - name: aiops-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8000
