
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiops-quality-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CrossFil/MLOps-CI-CD.git 
    targetRevision: HEAD
    path: final-project/aiops-quality-project/helm 
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
